<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200">
  <defs>
    <style>
      .bg{fill:#08111a}
      .panel{fill:#101b27;stroke:#31485f;stroke-width:2}
      .panel2{fill:#142232;stroke:#46627d;stroke-width:2}
      .title{fill:#eef4fb;font:700 34px Arial, sans-serif}
      .h{fill:#eef4fb;font:700 22px Arial, sans-serif}
      .t{fill:#c4d2df;font:400 18px Arial, sans-serif}
      .s{fill:#8ea3b7;font:400 16px Arial, sans-serif}
      .line{stroke:#8ea3b7;stroke-width:3;marker-end:url(#arrow)}
      .small{fill:#dbeeff;font:700 16px Arial, sans-serif}
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8ea3b7"/>
    </marker>
  </defs>
  <rect class="bg" width="1600" height="1200"/>
  <text x="800" y="60" text-anchor="middle" class="title">Kahu Ola V4.8 — System Architecture Diagram</text>
  <text x="800" y="92" text-anchor="middle" class="s">Cache-first civic hazard intelligence for Web, Mobile, Smartwatch, and Widgets</text>
  <rect class="panel" x="150" y="130" rx="24" ry="24" width="1300" height="145"/>
  <text x="800" y="170" text-anchor="middle" class="h">External Hazard Sources</text>
  <text x="260" y="210" class="t">NASA FIRMS</text>
  <text x="420" y="210" class="t">NWS Alerts</text>
  <text x="585" y="210" class="t">NOAA Radar / MRMS</text>
  <text x="840" y="210" class="t">EPA AirNow</text>
  <text x="990" y="210" class="t">NOAA HMS</text>
  <text x="1140" y="210" class="t">PacIOOS</text>
  <text x="1270" y="210" class="t">USGS HVO</text>
  <text x="250" y="245" class="s">VIIRS / MODIS hotspots</text>
  <text x="420" y="245" class="s">Weather warnings</text>
  <text x="620" y="245" class="s">Rainfall + storm context</text>
  <text x="840" y="245" class="s">AQI / PM2.5</text>
  <text x="990" y="245" class="s">Smoke plumes</text>
  <text x="1140" y="245" class="s">Ocean sensors</text>
  <text x="1270" y="245" class="s">Volcanic activity</text>
  <line class="line" x1="800" y1="275" x2="800" y2="340"/>
  <rect class="panel2" x="420" y="340" rx="24" ry="24" width="760" height="120"/>
  <text x="800" y="382" text-anchor="middle" class="h">Polling, Validation, and Normalization</text>
  <text x="800" y="417" text-anchor="middle" class="t">Scheduled pollers → strict schema validation → fail-closed drop → unified signal models</text>
  <text x="800" y="446" text-anchor="middle" class="s">FireSignal · FloodSignal · StormSignal · SmokeSignal · AirQualitySignal · VolcanicSignal</text>
  <line class="line" x1="800" y1="460" x2="800" y2="520"/>
  <rect class="panel" x="250" y="520" rx="24" ry="24" width="430" height="150"/>
  <text x="465" y="562" text-anchor="middle" class="h">Freshness + Event Priority</text>
  <text x="465" y="598" text-anchor="middle" class="t">FRESH / STALE_OK / STALE_DROP</text>
  <text x="465" y="628" text-anchor="middle" class="t">Degraded → Fire → Flood → Storm → Monitoring</text>
  <rect class="panel" x="920" y="520" rx="24" ry="24" width="430" height="150"/>
  <text x="1135" y="562" text-anchor="middle" class="h">Snapshot Cache Layer</text>
  <text x="1135" y="598" text-anchor="middle" class="t">Redis / KV / Edge Cache</text>
  <text x="1135" y="628" text-anchor="middle" class="t">Homepage summaries · Island summaries · Map bundles</text>
  <line class="line" x1="680" y1="595" x2="920" y2="595"/>
  <text x="800" y="580" text-anchor="middle" class="small">validated signals</text>
  <line class="line" x1="1135" y1="670" x2="1135" y2="750"/>
  <rect class="panel2" x="790" y="750" rx="24" ry="24" width="690" height="140"/>
  <text x="1135" y="792" text-anchor="middle" class="h">Cloudflare Worker Aggregator</text>
  <text x="1135" y="826" text-anchor="middle" class="t">Public endpoints only · cached reads · freshness labels · degraded-safe responses</text>
  <text x="1135" y="856" text-anchor="middle" class="s">/v1/home/summary · /v1/home/islands · /v1/hazards/fire · /v1/context/flood · /v1/system/health</text>
  <line class="line" x1="1135" y1="890" x2="1135" y2="965"/>
  <rect class="panel" x="120" y="965" rx="24" ry="24" width="410" height="155"/>
  <text x="325" y="1006" text-anchor="middle" class="h">Web Client</text>
  <text x="325" y="1040" text-anchor="middle" class="t">Homepage · Maui Page · Hawaiʻi Page · Live Map</text>
  <text x="325" y="1070" text-anchor="middle" class="s">Richest civic dashboard surface</text>
  <rect class="panel" x="595" y="965" rx="24" ry="24" width="410" height="155"/>
  <text x="800" y="1006" text-anchor="middle" class="h">Mobile Client</text>
  <text x="800" y="1040" text-anchor="middle" class="t">iOS / Android app · push notifications · local quick access</text>
  <text x="800" y="1070" text-anchor="middle" class="s">Thin rendering layer over shared API</text>
  <rect class="panel" x="1070" y="965" rx="24" ry="24" width="410" height="155"/>
  <text x="1275" y="1006" text-anchor="middle" class="h">Watch / Widget Clients</text>
  <text x="1275" y="1040" text-anchor="middle" class="t">Glanceable hero state · freshness · open on phone</text>
  <text x="1275" y="1070" text-anchor="middle" class="s">Compressed civic awareness surfaces</text>
</svg>