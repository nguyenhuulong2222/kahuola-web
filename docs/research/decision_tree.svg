<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1300" viewBox="0 0 1500 1300">
  <defs>
    <style>
      .bg{fill:#08111a}
      .box{fill:#101b27;stroke:#3a5670;stroke-width:2}
      .fire{fill:#2a1b11;stroke:#ff7a00;stroke-width:2}
      .flood{fill:#102338;stroke:#4da8ff;stroke-width:2}
      .storm{fill:#132634;stroke:#6cbcff;stroke-width:2}
      .ok{fill:#112519;stroke:#67c27e;stroke-width:2}
      .deg{fill:#2a1720;stroke:#ff5e7b;stroke-width:2}
      .title{fill:#eef4fb;font:700 34px Arial, sans-serif}
      .h{fill:#eef4fb;font:700 20px Arial, sans-serif}
      .t{fill:#c4d2df;font:400 16px Arial, sans-serif}
      .line{stroke:#8ea3b7;stroke-width:3;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8ea3b7"/>
    </marker>
  </defs>
  <rect class="bg" width="1500" height="1300"/>
  <text x="750" y="55" text-anchor="middle" class="title">Kahu Ola Multi-Hazard Decision Tree</text>
  <text x="750" y="88" text-anchor="middle" class="t">One primary hero · one primary map emphasis · one primary alert frame</text>
  <rect class="box" x="520" y="130" rx="24" ry="24" width="460" height="100"/>
  <text x="750" y="172" text-anchor="middle" class="h">Start: Evaluate Current Snapshot</text>
  <text x="750" y="202" text-anchor="middle" class="t">system health · severity · freshness · relevance · official warning status</text>
  <line class="line" x1="750" y1="230" x2="750" y2="300"/>
  <rect class="deg" x="520" y="300" rx="24" ry="24" width="460" height="100"/>
  <text x="750" y="342" text-anchor="middle" class="h">Critical Degraded Condition?</text>
  <text x="750" y="372" text-anchor="middle" class="t">If confidence is reduced, hero must become DEGRADED</text>
  <line class="line" x1="750" y1="400" x2="320" y2="500"/>
  <line class="line" x1="750" y1="400" x2="750" y2="500"/>
  <rect class="deg" x="90" y="500" rx="24" ry="24" width="460" height="120"/>
  <text x="320" y="542" text-anchor="middle" class="h">DEGRADED</text>
  <text x="320" y="572" text-anchor="middle" class="t">Some hazard sources are delayed</text>
  <text x="320" y="598" text-anchor="middle" class="t">Show last verified snapshot if policy allows</text>
  <rect class="box" x="520" y="500" rx="24" ry="24" width="460" height="100"/>
  <text x="750" y="542" text-anchor="middle" class="h">Immediate Life-Safety Hazard Present?</text>
  <text x="750" y="572" text-anchor="middle" class="t">Fire near populated area or Flood Warning?</text>
  <line class="line" x1="750" y1="600" x2="750" y2="690"/>
  <line class="line" x1="750" y1="600" x2="1160" y2="690"/>
  <rect class="fire" x="490" y="690" rx="24" ry="24" width="520" height="140"/>
  <text x="750" y="734" text-anchor="middle" class="h">FIRE_ACTIVE</text>
  <text x="750" y="766" text-anchor="middle" class="t">High-confidence fire near populated or user-relevant area</text>
  <text x="750" y="794" text-anchor="middle" class="t">Hero: Fire · Map: fire markers/perimeters · Copy: fire first</text>
  <rect class="flood" x="1020" y="690" rx="24" ry="24" width="390" height="140"/>
  <text x="1215" y="734" text-anchor="middle" class="h">FLOOD_WARNING</text>
  <text x="1215" y="766" text-anchor="middle" class="t">Official warning or flooding imminent</text>
  <text x="1215" y="794" text-anchor="middle" class="t">Hero: Flood Warning</text>
  <line class="line" x1="750" y1="830" x2="750" y2="930"/>
  <rect class="box" x="520" y="930" rx="24" ry="24" width="460" height="100"/>
  <text x="750" y="972" text-anchor="middle" class="h">No immediate life-safety hazard?</text>
  <text x="750" y="1002" text-anchor="middle" class="t">Check active hazard environment and scope</text>
  <line class="line" x1="750" y1="1030" x2="420" y2="1135"/>
  <line class="line" x1="750" y1="1030" x2="750" y2="1135"/>
  <line class="line" x1="750" y1="1030" x2="1080" y2="1135"/>
  <rect class="flood" x="170" y="1135" rx="24" ry="24" width="500" height="120"/>
  <text x="420" y="1177" text-anchor="middle" class="h">FLOOD_WATCH</text>
  <text x="420" y="1207" text-anchor="middle" class="t">Conditions support flooding, but warning not yet active</text>
  <rect class="storm" x="500" y="1135" rx="24" ry="24" width="500" height="120"/>
  <text x="750" y="1177" text-anchor="middle" class="h">STORM_ACTIVE / VOLCANIC_WATCH</text>
  <text x="750" y="1207" text-anchor="middle" class="t">Broad event framing when no stronger local hazard overrides</text>
  <rect class="ok" x="830" y="1135" rx="24" ry="24" width="500" height="120"/>
  <text x="1080" y="1177" text-anchor="middle" class="h">MONITORING</text>
  <text x="1080" y="1207" text-anchor="middle" class="t">No major elevated hazard wins the tree</text>
</svg>