<?xml version="1.0" encoding="UTF-8"?>
<!--
  Kahu Ola — Header Logo (tight-crop variant)
  Derived from logo-lockup.svg; viewBox cropped to visible content only,
  removing ~440px of wasted right-side whitespace from the original 1200×320 space.

  viewBox "78 45 760 235":
    x origin  78  — 17px breathing room left of the ring stroke edge
    y origin  45  — 20px breathing room above the icon cap / text ascenders
    width    760  — covers icon + "Kahu Ola" wordmark + generous font-variation buffer
    height   235  — from y=45 to y=280; comfortably below both icon and subtitle

  Intrinsic aspect ratio 760:235 ≈ 3.23:1
  At CSS height:44px → rendered width ≈ 142px (vs original ≈ 127px wide but visually ~80px of content)
  Icon rendered diameter: 34px (was 19.5px at height:34px with original SVG) — 1.76× more prominent
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="760" height="235"
     viewBox="78 45 760 235"
     role="img"
     aria-label="Kahu Ola — Guardian of Life">
  <defs>
    <linearGradient id="petalGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB15A"/>
      <stop offset="55%" stop-color="#FF6A7A"/>
      <stop offset="100%" stop-color="#D94BFF"/>
    </linearGradient>
    <linearGradient id="petalGrad2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB15A"/>
      <stop offset="60%" stop-color="#FF5E8A"/>
      <stop offset="100%" stop-color="#B24BFF"/>
    </linearGradient>
    <radialGradient id="discGrad" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1B2A3B"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </radialGradient>
  </defs>

  <g transform="translate(90,60)">
    <circle cx="100" cy="100" r="92" fill="none" stroke="#BFD3EA" stroke-opacity="0.55" stroke-width="5"/>
    <circle cx="100" cy="100" r="88" fill="url(#discGrad)"/>
    <g transform="translate(100,100)">
      <path d="M0,-62 C22,-62 38,-44 38,-22 C38,-4 26,10 0,30 C-26,10 -38,-4 -38,-22 C-38,-44 -22,-62 0,-62Z" fill="url(#petalGrad)" opacity="0.95"/>
      <g transform="rotate(72)">
        <path d="M0,-62 C22,-62 38,-44 38,-22 C38,-4 26,10 0,30 C-26,10 -38,-4 -38,-22 C-38,-44 -22,-62 0,-62Z" fill="url(#petalGrad2)" opacity="0.92"/>
      </g>
      <g transform="rotate(144)">
        <path d="M0,-62 C22,-62 38,-44 38,-22 C38,-4 26,10 0,30 C-26,10 -38,-4 -38,-22 C-38,-44 -22,-62 0,-62Z" fill="url(#petalGrad)" opacity="0.92"/>
      </g>
      <g transform="rotate(216)">
        <path d="M0,-62 C22,-62 38,-44 38,-22 C38,-4 26,10 0,30 C-26,10 -38,-4 -38,-22 C-38,-44 -22,-62 0,-62Z" fill="url(#petalGrad2)" opacity="0.92"/>
      </g>
      <g transform="rotate(288)">
        <path d="M0,-62 C22,-62 38,-44 38,-22 C38,-4 26,10 0,30 C-26,10 -38,-4 -38,-22 C-38,-44 -22,-62 0,-62Z" fill="url(#petalGrad)" opacity="0.92"/>
      </g>
      <circle cx="0" cy="0" r="9" fill="#111827"/>
      <circle cx="0" cy="0" r="5.5" fill="#FF4F8A"/>
    </g>
  </g>

  <g transform="translate(310,118)">
    <text x="0" y="0" fill="#0F172A"
          font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
          font-size="92" font-weight="800" letter-spacing="-1.5">Kahu Ola</text>
    <text x="2" y="72" fill="#334155"
          font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif"
          font-size="44" font-weight="500" letter-spacing="-0.2">Guardian of Life</text>
  </g>
</svg>
