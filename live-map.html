<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kahu Ola | Live Hazard Map</title>
<meta name="theme-color" content="#0c0c0c">
<link rel="canonical" href="https://kahuola.org/live-map.html">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=DM+Mono&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0c0c0c; --surface: #161616; --panel: rgba(10,10,10,.9);
  --border: rgba(255,255,255,.1); --text: #e8e8e8; --muted: #666;
  --accent: #ff5722; --green: #4caf50; --amber: #ff9800; --red: #f44336;
  --mono: "DM Mono", monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: "DM Sans", system-ui; font-size: 14px; }

#app { display: grid; grid-template-rows: 52px 1fr; height: 100vh; }

header {
  display: flex; align-items: center; gap: 12px; padding: 0 16px;
  background: var(--surface); border-bottom: 1px solid var(--border); z-index: 100;
}
.logo { font-weight: 600; font-size: 15px; line-height: 1.2; }
.logo small { display: block; font-size: 10px; color: var(--muted); font-family: var(--mono); }

#banners { flex: 1; display: flex; gap: 6px; justify-content: flex-end; }
.banner { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 4px; font-size: 11px; font-family: var(--mono); }
.banner.hidden { display: none; }
.b-red   { background: rgba(244,67,54,.15);  border: 1px solid rgba(244,67,54,.4);  color: #ef9a9a; }
.b-amber { background: rgba(255,152,0,.12);  border: 1px solid rgba(255,152,0,.35); color: #ffcc80; }
.b-blue  { background: rgba(66,165,245,.1);  border: 1px solid rgba(66,165,245,.3); color: #90caf9; }

/* map + panel wrapper */
#map-wrap { position: relative; width: 100%; height: 100%; }

iframe#map {
  width: 100%; height: 100%; border: none; display: block;
}

/* floating panel */
.panel {
  position: absolute; right: 16px; top: 16px; width: 255px;
  background: var(--panel); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: 8px; overflow: hidden; z-index: 10;
}
.p-title {
  padding: 9px 14px 7px; font-size: 10px; font-weight: 600; letter-spacing: .08em;
  color: var(--muted); text-transform: uppercase; font-family: var(--mono);
  border-bottom: 1px solid var(--border);
}
.p-body { padding: 10px 14px; }

.row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,.05); font-size: 12px; }
.row:last-of-type { border-bottom: none; }
.rl { color: #999; }
.rv { font-family: var(--mono); font-weight: 600; }
.c-fire { color: var(--accent); } .c-good { color: var(--green); }
.c-amber{ color: var(--amber); } .c-crit { color: var(--red); }
.c-muted{ color: var(--muted); }

.fresh {
  display: inline-block; margin-top: 8px;
  font-size: 9px; font-family: var(--mono); font-weight: 600;
  letter-spacing: .06em; padding: 2px 7px; border-radius: 3px;
}
.f-fresh     { background: rgba(76,175,80,.12);   color: var(--green); border: 1px solid rgba(76,175,80,.3); }
.f-stale-ok  { background: rgba(255,152,0,.1);    color: var(--amber); border: 1px solid rgba(255,152,0,.3); }
.f-stale-drop{ background: rgba(100,100,100,.12); color: #888;         border: 1px solid rgba(100,100,100,.2); }
.f-unknown   { background: rgba(100,100,100,.08); color: #555;         border: 1px solid rgba(100,100,100,.15); }

.btn-refresh {
  width: 100%; margin-top: 8px; padding: 6px; background: none;
  border: 1px solid var(--border); border-radius: 4px; color: #888;
  font-family: var(--mono); font-size: 10px; letter-spacing: .04em; cursor: pointer;
  transition: border-color .15s, color .15s;
}
.btn-refresh:hover    { border-color: var(--accent); color: var(--accent); }
.btn-refresh:disabled { opacity: .35; cursor: not-allowed; }

footer {
  position: absolute; bottom: 8px; right: 16px;
  font-size: 10px; color: var(--muted); font-family: var(--mono); z-index: 10; pointer-events: none;
}

.spin { display: inline-block; width: 9px; height: 9px; border: 1.5px solid rgba(255,255,255,.15); border-top-color: var(--accent); border-radius: 50%; animation: sp .6s linear infinite; vertical-align: middle; }
@keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>

<body>
<div id="app">

  <header>
    <div class="logo">🔥 Kahu Ola <small>V4.3.1 · CIVIC HAZARD MAP</small></div>
    <div id="banners" role="status" aria-live="polite">
      <div id="b-parse"    class="banner b-red   hidden">⚠ Data format error</div>
      <div id="b-offline"  class="banner b-amber hidden">Offline</div>
      <div id="b-degraded" class="banner b-amber hidden">Source degraded</div>
      <div id="b-cooldown" class="banner b-blue  hidden">Retrying…</div>
    </div>
  </header>

  <div id="map-wrap">

    <!-- Google Maps iframe — no API key needed for basic embed -->
    <iframe id="map"
      src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d55000!2d-156.675!3d20.878!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1sen!2sus!4v1"
      allowfullscreen
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade"
      title="Maui hazard map">
    </iframe>

    <!-- metrics panel -->
    <div class="panel">
      <div class="p-title">Fire Signals · Maui</div>
      <div class="p-body">
        <div class="row"><span class="rl">Detections</span> <span class="rv c-fire" id="v-count"><span class="spin"></span></span></div>
        <div class="row"><span class="rl">Nearest</span>    <span class="rv" id="v-near">—</span></div>
        <div class="row"><span class="rl">Critical</span>   <span class="rv" id="v-crit">—</span></div>
        <div class="row"><span class="rl">Fetched</span>    <span class="rv c-muted" id="v-time">—</span></div>
        <div id="v-fresh" class="fresh f-unknown">● UNKNOWN</div>
        <button class="btn-refresh" id="btn-refresh">↻ REFRESH</button>
      </div>
    </div>

    <!-- §33 disclaimer -->
    <footer>Kahu Ola · not an official emergency directive</footer>

  </div>
</div>

<script>
"use strict";

/* Invariant I — all data via kahuola.org Worker only */
const AGGREGATOR_BASE = "https://kahuola.org";
const ENDPOINT_FIRE   = `${AGGREGATOR_BASE}/api/firms/hotspots?bbox=-157.2,20.4,-156.1,21.2&days=1`;

/* Reference center — on-device only, never transmitted — Invariant IV */
const REF = [-156.675, 20.878];

const POLL_MS = 5 * 60 * 1000;  /* §15: 5-min floor */
const TIMEOUT = 12_000;
const DEG_LIM = 3;

/* DiagnosticsStore §11 */
const DS = {
  netFail: 0, parseFail: 0, consec: 0,
  health: "healthy", cooldown: false, cooldownUntil: null,
  offline: false, lastFire: null,

  get isCooldown() { return this.cooldown && this.cooldownUntil && Date.now() < this.cooldownUntil; },

  err(d) {
    if (d === "net")   { this.netFail++;   this.consec++; }
    if (d === "parse") { this.parseFail++; this.consec++; }
    if (this.consec >= DEG_LIM) this.health = "degraded";
    this.ui();
  },
  ok() {
    this.consec = 0; this.health = "healthy";
    this.cooldown = false; this.offline = false;
    this.lastFire = new Date(); this.ui();
  },
  cool(s = 60) { this.cooldown = true; this.cooldownUntil = Date.now() + s * 1000; this.ui(); },

  ui() {
    tog("b-parse",    this.parseFail > 0);
    tog("b-offline",  this.offline);
    tog("b-degraded", this.health === "degraded" && !this.offline);
    tog("b-cooldown", this.isCooldown);
  },
};

function set(id, v) { const e = document.getElementById(id); if (e) e.textContent = String(v); }
function tog(id, v) { const e = document.getElementById(id); if (e) e.classList.toggle("hidden", !v); }

function hst(d) {
  return (d || new Date()).toLocaleTimeString("en-US",
    { timeZone: "Pacific/Honolulu", hour: "2-digit", minute: "2-digit" }) + " HST";
}

function distMi(a, b) {
  const R = 3958.8, dl = (b[1]-a[1])*Math.PI/180, dL = (b[0]-a[0])*Math.PI/180;
  const x = Math.sin(dl/2)**2 + Math.cos(a[1]*Math.PI/180)*Math.cos(b[1]*Math.PI/180)*Math.sin(dL/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}

function setFresh(d) {
  const el = document.getElementById("v-fresh"); if (!el) return;
  const m = d ? (Date.now() - d.getTime()) / 60000 : null;
  const f = !m ? "unknown" : m <= 10 ? "fresh" : m <= 60 ? "stale_ok" : "stale_drop";
  const map = { fresh: ["f-fresh","✓ FRESH"], stale_ok: ["f-stale-ok","⚠ MAY BE STALE"], stale_drop: ["f-stale-drop","✗ OUTDATED"], unknown: ["f-unknown","● UNKNOWN"] };
  el.className = `fresh ${map[f][0]}`;
  el.textContent = map[f][1];
}

/* Strict fetch — Invariant III */
async function safeFetch(url) {
  const ctrl = new AbortController();
  const tid  = setTimeout(() => ctrl.abort(), TIMEOUT);
  try {
    const r = await fetch(url, { signal: ctrl.signal });
    clearTimeout(tid);
    if (r.status === 429) { DS.cool(); return []; }
    if (!r.ok) { DS.err("net"); return []; }
    let data;
    try { data = JSON.parse(await r.text()); } catch { DS.err("parse"); return []; }
    if (!data?.features || !Array.isArray(data.features)) { DS.err("parse"); return []; }
    DS.ok();
    return data.features;
  } catch {
    clearTimeout(tid);
    if (!navigator.onLine) DS.offline = true;
    DS.err("net");
    return [];
  }
}

/* Load + update panel — map is iframe, markers handled separately */
async function load() {
  const btn = document.getElementById("btn-refresh");
  if (btn) btn.disabled = true;
  document.getElementById("v-count").innerHTML = `<span class="spin"></span>`;

  const features = await safeFetch(ENDPOINT_FIRE);

  let closest = Infinity, crits = 0;
  features.forEach(f => {
    if (!f?.geometry?.coordinates) return;
    const c = f.geometry.coordinates;
    if (!Array.isArray(c) || c.length < 2) return;
    if (c[0] < -180 || c[0] > 180 || c[1] < -90 || c[1] > 90) return;
    if ((f.properties?.severity || "") === "CRITICAL") crits++;
    const d = distMi(REF, c);
    if (d < closest) closest = d;
  });

  const ce = document.getElementById("v-count");
  ce.textContent = features.length;
  ce.className   = `rv ${features.length > 0 ? "c-fire" : "c-good"}`;

  const ne = document.getElementById("v-near");
  ne.textContent = features.length === 0 ? "None" : closest < 9999 ? closest.toFixed(1) + " mi" : "—";
  ne.className   = `rv ${features.length === 0 ? "c-good" : closest < 5 ? "c-crit" : closest < 20 ? "c-amber" : ""}`;

  const cr = document.getElementById("v-crit");
  cr.textContent = crits > 0 ? crits : "None";
  cr.className   = `rv ${crits > 0 ? "c-crit" : "c-good"}`;

  set("v-time", DS.lastFire ? hst(DS.lastFire) : "—");
  setFresh(DS.lastFire);
  if (btn) btn.disabled = false;
}

window.addEventListener("offline", () => { DS.offline = true; DS.ui(); });
window.addEventListener("online",  () => { DS.offline = false; DS.ui(); load(); });
document.getElementById("btn-refresh")?.addEventListener("click", () => { if (!DS.isCooldown) load(); });

/* Invariant I guard */
const _f = window.fetch.bind(window);
window.fetch = (url, ...a) => {
  const blocked = ["firms.modaps.eosdis.nasa.gov","airnowapi.org","hazards.weather.gov"];
  if (blocked.some(d => String(url).includes(d))) { DS.err("net"); return Promise.reject(new Error("InvariantI")); }
  return _f(url, ...a);
};

/* Init */
load();
setInterval(() => { if (!DS.isCooldown && !DS.offline) load(); }, POLL_MS);
</script>
</body>
</html>
