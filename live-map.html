<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Kahu Ola | Live Fire Map</title>
  <meta name="description" content="Kahu Ola civic wildfire situational awareness for Hawaiʻi.">
  <link rel="canonical" href="https://kahuola.org/live-map.html">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0c0c0c">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    :root{
      --bg:#0c0c0c;
      --panel:rgba(13,13,13,.94);
      --panel-strong:rgba(10,10,10,.97);
      --border:rgba(255,255,255,.08);
      --border-hi:rgba(255,255,255,.14);
      --text:#ececec;
      --text-dim:#b5b5b5;
      --muted:#7a7a7a;
      --accent:#ff6a00;
      --crit:#ff1744;
      --green:#4caf50;
      --amber:#ff9800;
      --blue:#4da3ff;
      --radius:18px;
      --shadow:0 16px 42px rgba(0,0,0,.35);

      --font-body:"DM Sans",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      --font-mono:"DM Mono",ui-monospace,SFMono-Regular,Menlo,monospace;

      --safe-top:env(safe-area-inset-top, 0px);
      --safe-right:env(safe-area-inset-right, 0px);
      --safe-bottom:env(safe-area-inset-bottom, 0px);
      --safe-left:env(safe-area-inset-left, 0px);

      --header-h:64px;
      --sheet-peek:96px;
    }

    *{box-sizing:border-box}
    *::before,*::after{box-sizing:border-box}

    html, body{
      margin:0;
      width:100%;
      height:100%;
      min-height:-webkit-fill-available;
      background:var(--bg);
      color:var(--text);
      font-family:var(--font-body);
      overflow:hidden;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    body{
      min-height:-webkit-fill-available;
    }

    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font:inherit}
    .hidden{display:none !important}

    #app{
      position:relative;
      width:100%;
      height:100dvh;
      min-height:-webkit-fill-available;
      overflow:hidden;
      background:var(--bg);
    }

    #map-wrap{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#000;
    }

    #map{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      background:#000;
    }

    }

    header{
      position:absolute;
      top:0;
      left:0;
      right:0;
      z-index:50;
      display:flex;
      align-items:center;
      gap:12px;
      min-height:var(--header-h);
      padding:
        calc(8px + var(--safe-top))
        calc(12px + var(--safe-right))
        8px
        calc(12px + var(--safe-left));
      background:linear-gradient(to bottom, rgba(8,8,8,.94), rgba(8,8,8,.72), rgba(8,8,8,.18), transparent);
      pointer-events:none;
    }

    .brand{
      min-width:0;
      pointer-events:auto;
    }

    .logo{
      font-weight:700;
      font-size:15px;
      line-height:1.05;
      letter-spacing:-.01em;
    }

    .logo small{
      display:block;
      margin-top:3px;
      color:var(--text-dim);
      font-size:10px;
      font-weight:500;
      font-family:var(--font-mono);
      letter-spacing:.08em;
      white-space:nowrap;
    }

    .header-right{
      margin-left:auto;
      display:flex;
      align-items:center;
      gap:8px;
      pointer-events:auto;
    }

    .menu-links{
      display:flex;
      gap:8px;
    }

    .menu-link{
      min-height:34px;
      padding:0 12px;
      display:inline-flex;
      align-items:center;
      border:1px solid var(--border-hi);
      border-radius:999px;
      background:rgba(18,18,18,.76);
      color:var(--text-dim);
      font-size:11px;
      font-family:var(--font-mono);
      backdrop-filter:blur(10px);
      -webkit-backdrop-filter:blur(10px);
    }

    .desktop-panel{
      position:absolute;
      top:calc(84px + var(--safe-top));
      right:calc(16px + var(--safe-right));
      z-index:40;
      width:340px;
      max-width:calc(100vw - 32px);
      background:var(--panel);
      border:1px solid var(--border-hi);
      border-radius:var(--radius);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .sheet{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:45;
      display:none;
      padding:
        0
        calc(10px + var(--safe-right))
        calc(10px + var(--safe-bottom))
        calc(10px + var(--safe-left));
      pointer-events:none;
    }

    .sheet-card{
      pointer-events:auto;
      background:var(--panel-strong);
      border:1px solid var(--border-hi);
      border-radius:22px 22px 18px 18px;
      box-shadow:0 -12px 36px rgba(0,0,0,.35);
      overflow:hidden;
      transform:translateY(calc(100% - var(--sheet-peek)));
      transition:transform .26s ease;
      max-height:78dvh;
      display:flex;
      flex-direction:column;
    }

    .sheet.open .sheet-card{
      transform:translateY(0);
    }

    .sheet-topbar{
      padding:8px 10px 10px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:rgba(255,255,255,.01);
    }

    .sheet-handle-wrap{
      display:flex;
      justify-content:center;
      padding:0 0 8px;
      cursor:pointer;
      touch-action:manipulation;
    }

    .sheet-handle{
      width:42px;
      height:5px;
      border-radius:999px;
      background:rgba(255,255,255,.22);
    }

    .sheet-quick-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .sheet-quick-actions .action-btn{
      flex:1 1 120px;
      min-height:38px;
      border-radius:999px;
      font-size:10px;
      padding:0 10px;
    }

    .panel-head{
      padding:12px 14px 10px;
      border-bottom:1px solid var(--border);
      font-size:10px;
      font-weight:600;
      font-family:var(--font-mono);
      color:var(--text-dim);
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .panel-body{
      padding:10px 14px 14px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
    }

    .metric{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      padding:9px 0;
      border-bottom:1px solid var(--border);
    }

    .metric:last-of-type{border-bottom:none}

    .metric-label{
      font-size:12px;
      color:var(--text-dim);
    }

    .metric-value{
      font-size:13px;
      font-weight:600;
      font-family:var(--font-mono);
      text-align:right;
    }

    .v-fire{color:var(--accent)}
    .v-good{color:var(--green)}
    .v-warn{color:var(--amber)}
    .v-crit{color:var(--crit)}
    .v-dim{color:var(--muted)}
    .v-blue{color:var(--blue)}

    .freshness{
      display:inline-flex;
      align-items:center;
      gap:5px;
      margin-top:10px;
      padding:4px 9px;
      border-radius:999px;
      font-size:10px;
      font-weight:600;
      font-family:var(--font-mono);
      letter-spacing:.05em;
      text-transform:uppercase;
    }

    .f-fresh{
      background:rgba(76,175,80,.12);
      border:1px solid rgba(76,175,80,.28);
      color:var(--green);
    }

    .f-stale{
      background:rgba(255,152,0,.12);
      border:1px solid rgba(255,152,0,.28);
      color:var(--amber);
    }

    .f-old{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      color:#999;
    }

    .f-unknown{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      color:#777;
    }

    .summary-card{
      margin-top:12px;
      padding:12px;
      border:1px solid var(--border);
      border-radius:14px;
      background:rgba(255,255,255,.03);
    }

    .summary-title{
      margin-bottom:8px;
      color:var(--text-dim);
      font-size:10px;
      font-weight:600;
      font-family:var(--font-mono);
      letter-spacing:.08em;
      text-transform:uppercase;
    }

    .summary-text{
      font-size:14px;
      line-height:1.55;
      color:var(--text);
    }

    .summary-meta{
      margin-top:10px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      min-height:28px;
      max-width:100%;
      padding:4px 10px;
      border-radius:999px;
      border:1px solid var(--border-hi);
      background:rgba(255,255,255,.03);
      color:var(--text-dim);
      font-size:10px;
      font-family:var(--font-mono);
      line-height:1.3;
      white-space:normal;
      overflow-wrap:anywhere;
    }

    .panel-actions{
      display:flex;
      gap:8px;
      margin-top:12px;
      flex-wrap:wrap;
    }

    .refresh-btn,
    .action-btn{
      min-height:42px;
      border:1px solid var(--border-hi);
      border-radius:14px;
      background:transparent;
      color:var(--text-dim);
      cursor:pointer;
      font-size:12px;
      font-weight:600;
      font-family:var(--font-mono);
      letter-spacing:.04em;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      -webkit-tap-highlight-color:transparent;
      touch-action:manipulation;
      padding:0 12px;
    }

    .refresh-btn{width:100%}
    .action-btn{flex:1}
    .action-btn.locate-btn,
    .action-btn.satellite-btn{
      background:rgba(77,163,255,.08);
      border-color:rgba(77,163,255,.24);
      color:#c6e0ff;
    }

    .action-btn.satellite-btn.active{
      background:rgba(255,152,0,.10);
      border-color:rgba(255,152,0,.28);
      color:#ffd6ab;
    }

    .refresh-btn:disabled,
    .action-btn:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .popup-card{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .popup-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }

    .popup-title{
      font-weight:700;
      font-size:14px;
      line-height:1.2;
    }

    .popup-severity{
      display:inline-flex;
      align-items:center;
      min-height:24px;
      padding:0 8px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      font-size:10px;
      font-family:var(--font-mono);
      white-space:nowrap;
    }

    .popup-severity.critical{
      color:#ff9cb0;
      border-color:rgba(255,23,68,.25);
      background:rgba(255,23,68,.10);
    }

    .popup-severity.normal{
      color:#ffd2a3;
      border-color:rgba(255,138,0,.22);
      background:rgba(255,138,0,.10);
    }

    .popup-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }

    .popup-metric{
      padding:8px 9px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      background:rgba(255,255,255,.03);
    }

    .popup-metric-label{
      font-size:10px;
      font-family:var(--font-mono);
      color:#9d9d9d;
      margin-bottom:4px;
      letter-spacing:.03em;
    }

    .popup-metric-value{
      font-size:12px;
      font-weight:600;
      color:#f1f1f1;
      line-height:1.3;
      word-break:break-word;
    }

    .popup-coords{
      color:#aaa;
      font-family:var(--font-mono);
      font-size:11px;
    }

    .popup-note{
      color:#9bc4ff;
      font-size:11px;
      line-height:1.4;
      padding:8px 9px;
      border:1px solid rgba(77,163,255,.16);
      border-radius:12px;
      background:rgba(77,163,255,.05);
    }

    .popup-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    .popup-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:32px;
      padding:0 10px;
      border:1px solid rgba(255,255,255,.12);
      border-radius:999px;
      background:rgba(255,255,255,.04);
      color:#eee;
      font-size:11px;
      font-family:var(--font-mono);
      text-decoration:none;
      flex:1 1 120px;
    }

    .user-marker{
      width:16px;
      height:16px;
      border-radius:50%;
      background:var(--blue);
      border:3px solid rgba(255,255,255,.95);
      box-shadow:0 0 0 10px rgba(77,163,255,.18);
    }

    .spinner{
      display:inline-block;
      width:10px;
      height:10px;
      margin-right:4px;
      border:1.5px solid rgba(255,255,255,.14);
      border-top-color:var(--accent);
      border-radius:50%;
      vertical-align:middle;
      animation:spin .7s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .maplibregl-popup-content{
      background:#111 !important;
      color:var(--text) !important;
      border:1px solid rgba(255,255,255,.10) !important;
      border-radius:14px !important;
      font-family:var(--font-body) !important;
      font-size:12px !important;
      padding:12px !important;
      box-shadow:0 10px 24px rgba(0,0,0,.32) !important;
      max-width:320px !important;
    }

    .maplibregl-popup-tip{
      border-top-color:#111 !important;
    }

    .maplibregl-ctrl-top-left{
      top:calc(78px + var(--safe-top));
      left:12px;
    }

    .maplibregl-ctrl-group{
      overflow:hidden;
      background:rgba(20,20,20,.90) !important;
      border:1px solid var(--border-hi) !important;
      border-radius:12px !important;
      box-shadow:0 8px 22px rgba(0,0,0,.26);
    }

    .maplibregl-ctrl button{
      width:36px !important;
      height:36px !important;
    }

    .maplibregl-ctrl-scale{
      margin:0 0 16px 16px !important;
      background:rgba(0,0,0,.54) !important;
      color:var(--text-dim) !important;
      border-color:var(--border-hi) !important;
      border-radius:8px !important;
      font-family:var(--font-mono) !important;
      font-size:10px !important;
    }

    @media (max-width:980px){
      .desktop-panel{display:none}
      .sheet{display:block}
      .menu-links{display:none}
    }

    @media (max-width:768px){
      :root{
        --header-h:58px;
        --sheet-peek:96px;
      }

      .logo{
        font-size:14px;
      }

      .logo small{
        font-size:9px;
        line-height:1.15;
      }

      .sheet-card{
        max-height:78dvh;
      }

      .popup-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header role="banner">
      <div class="brand" aria-label="Kahu Ola — Civic Fire Detection Map">
        <div class="logo">
          🔥 Kahu Ola
          <small>V4.4 · HAWAIʻI FIRE DETECTION MAP</small>
        </div>
      </div>

      <div class="header-right">
        <nav class="menu-links" aria-label="Site links">
          <a class="menu-link" href="/privacy.html">Privacy</a>
          <a class="menu-link" href="/support.html">Support</a>
        </nav>
      </div>
    </header>

    <div id="map-wrap">
      <div id="map"></div>

      <aside class="desktop-panel">
        <div class="panel-head">Fire Signals · Hawaiʻi</div>
        <div class="panel-body" id="panel-content-desktop"></div>
      </aside>

      <section class="sheet" id="mobile-sheet">
        <div class="sheet-card">
          <div class="sheet-topbar">
            <div class="sheet-handle-wrap" id="sheet-handle-wrap">
              <div class="sheet-handle"></div>
            </div>
            <div class="sheet-quick-actions">
              <button class="action-btn" id="sheet-toggle-btn" type="button">Map Details</button>
              <button class="action-btn locate-btn" id="locate-btn-mobile" type="button">Use My Location</button>
              <button class="action-btn satellite-btn" id="satellite-btn-mobile" type="button">Satellite</button>
              <a class="action-btn" href="/support.html">Support</a>
            </div>
          </div>
          <div class="panel-head">Fire Signals · Hawaiʻi</div>
          <div class="panel-body" id="panel-content-mobile"></div>
        </div>
      </section>
    </div>
  </div>

  <template id="panel-template">
    <div class="metric">
      <span class="metric-label">Detections</span>
      <span class="metric-value v-fire" id="fire-count"><span class="spinner"></span></span>
    </div>

    <div class="metric">
      <span class="metric-label">Nearest</span>
      <span class="metric-value" id="nearest-fire">—</span>
    </div>

    <div class="metric">
      <span class="metric-label">Critical</span>
      <span class="metric-value" id="critical-count">—</span>
    </div>

    <div class="metric">
      <span class="metric-label">Fetched</span>
      <span class="metric-value v-dim" id="fetch-time">—</span>
    </div>

    <div class="metric">
      <span class="metric-label">Source</span>
      <span class="metric-value v-dim" id="data-source">—</span>
    </div>

    <div class="metric">
      <span class="metric-label">View</span>
      <span class="metric-value v-blue" id="view-mode">Statewide</span>
    </div>

    <div class="metric">
      <span class="metric-label">Basemap</span>
      <span class="metric-value v-blue" id="basemap-mode">Dark</span>
    </div>

    <div class="freshness f-unknown" id="freshness-badge">● UNKNOWN</div>

    <div class="summary-card">
      <div class="summary-title">Civic Intelligence</div>
      <div class="summary-text" id="summary-text">Waiting for the latest wildfire signal summary.</div>
      <div class="summary-meta">
        <span class="chip" id="summary-source">Source: Kahu Ola</span>
        <span class="chip" id="summary-updated">Updated: —</span>
        <span class="chip" id="summary-privacy">Location stays on device</span>
      </div>
    </div>

    <div class="panel-actions">
      <button class="refresh-btn" id="refresh-btn" type="button">↻ REFRESH</button>
    </div>

    <div class="panel-actions">
      <button class="action-btn locate-btn" id="locate-btn-panel" type="button">Use My Location</button>
      <button class="action-btn satellite-btn" id="satellite-btn-panel" type="button">Satellite</button>
      <a class="action-btn" href="/privacy.html">Privacy</a>
      <a class="action-btn" href="/support.html">Support</a>
    </div>
  </template>

  <script>
    "use strict";

    const MAPTILER_KEY = "gZAlLuBvEe2xMGBVun5D";
    const STYLES = {
      dark: `https://api.maptiler.com/maps/streets-v2-dark/style.json?key=${MAPTILER_KEY}`,
      satellite: `https://api.maptiler.com/maps/hybrid/style.json?key=${MAPTILER_KEY}`
    };

    const IS_LOCAL =
      location.hostname === "127.0.0.1" ||
      location.hostname === "localhost" ||
      location.protocol === "file:";

    const FIRE_ENDPOINT = IS_LOCAL
      ? "./fires-test.json"
      : "https://kahuola.org/api/firms/hotspots?bbox=-161.5,18.5,-154.5,22.8&days=1";

    const HAWAII_BOUNDS = [[-160.9, 18.8], [-154.7, 22.5]];
    const HAWAII_CENTER = [-157.9, 20.5];
    const REF_CENTER = [-156.675, 20.878];
    const MOBILE_BREAKPOINT = 980;
    const FETCH_TIMEOUT_MS = 12000;

    const mobileSheet = document.getElementById("mobile-sheet");
    const sheetToggleBtn = document.getElementById("sheet-toggle-btn");
    const sheetHandleWrap = document.getElementById("sheet-handle-wrap");

    let lastKnownUserCoord = null;
    let userMarker = null;
    let currentViewMode = "Statewide";
    let latestFeatures = [];
    let currentBasemap = "dark";

    function mountPanel(targetId, suffix) {
      const target = document.getElementById(targetId);
      const tpl = document.getElementById("panel-template");
      const fragment = tpl.content.cloneNode(true);
      fragment.querySelectorAll("[id]").forEach((el) => {
        el.id = `${el.id}-${suffix}`;
      });
      target.innerHTML = "";
      target.appendChild(fragment);
    }

    mountPanel("panel-content-desktop", "desktop");
    mountPanel("panel-content-mobile", "mobile");

    function activeSuffix() {
      return window.innerWidth <= MOBILE_BREAKPOINT ? "mobile" : "desktop";
    }

    function ui(baseId) {
      return document.getElementById(`${baseId}-${activeSuffix()}`);
    }

    function setText(baseId, value) {
      const el = ui(baseId);
      if (el) el.textContent = String(value);
    }

    function safeResize() {
      map.resize();
    }

    function setSheetOpen(open) {
      if (window.innerWidth > MOBILE_BREAKPOINT) return;
      mobileSheet.classList.toggle("open", open);
      sheetToggleBtn.textContent = open ? "Hide Details" : "Map Details";
      setTimeout(safeResize, 200);
    }

    function formatDetectedTime(acqDate, acqTime) {
      if (!acqDate && !acqTime) return "Unavailable";
      const timeStr = acqTime ? String(acqTime).padStart(4, "0") : "";
      const hh = timeStr ? timeStr.slice(0, 2) : "--";
      const mm = timeStr ? timeStr.slice(2, 4) : "--";
      return `${acqDate || "—"} ${timeStr ? `${hh}:${mm} UTC` : ""}`.trim();
    }

    function distMiles(a, b) {
      const R = 3958.8;
      const dLat = (b[1] - a[1]) * Math.PI / 180;
      const dLon = (b[0] - a[0]) * Math.PI / 180;
      const lat1 = a[1] * Math.PI / 180;
      const lat2 = b[1] * Math.PI / 180;
      const x =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
    }

    function normalizeFireFeatures(rawFeatures) {
      return rawFeatures
        .filter((f) => f && f.geometry && Array.isArray(f.geometry.coordinates))
        .map((f) => {
          const lng = Number(f.geometry.coordinates[0]);
          const lat = Number(f.geometry.coordinates[1]);
          if (!Number.isFinite(lng) || !Number.isFinite(lat)) return null;

          return {
            type: "Feature",
            geometry: { type: "Point", coordinates: [lng, lat] },
            properties: {
              severity: f.properties?.severity || "UNKNOWN",
              frp: f.properties?.frp || null,
              confidence: f.properties?.confidence || null,
              acq_date: f.properties?.acq_date || null,
              acq_time: f.properties?.acq_time || null
            }
          };
        })
        .filter(Boolean);
    }

    const map = new maplibregl.Map({
      container: "map",
      style: STYLES.dark,
      center: HAWAII_CENTER,
      zoom: 6.5,
      attributionControl: true,
      antialias: false,
      failIfMajorPerformanceCaveat: false
    });

    map.addControl(new maplibregl.NavigationControl({ showCompass: false }), "top-left");
    map.addControl(new maplibregl.ScaleControl({ unit: "imperial" }), "bottom-left");

    function ensureFireLayers() {
      if (!map.getSource("fires")) {
        map.addSource("fires", {
          type: "geojson",
          data: { type: "FeatureCollection", features: [] },
          cluster: true,
          clusterMaxZoom: 9,
          clusterRadius: 52
        });
      }

      if (!map.getLayer("clusters")) {
        map.addLayer({
          id: "clusters",
          type: "circle",
          source: "fires",
          filter: ["has", "point_count"],
          paint: {
            "circle-color": ["step", ["get", "point_count"], "#ff8a00", 8, "#ff6a00", 20, "#ff3d00"],
            "circle-radius": ["step", ["get", "point_count"], 16, 8, 22, 20, 28],
            "circle-opacity": 0.95,
            "circle-stroke-width": 2,
            "circle-stroke-color": "rgba(255,140,0,0.26)"
          }
        });
      }

      if (!map.getLayer("cluster-count")) {
        map.addLayer({
          id: "cluster-count",
          type: "symbol",
          source: "fires",
          filter: ["has", "point_count"],
          layout: {
            "text-field": ["get", "point_count_abbreviated"],
            "text-font": ["Open Sans Bold"],
            "text-size": 12
          },
          paint: { "text-color": "#ffffff" }
        });
      }

      if (!map.getLayer("unclustered-fires-glow")) {
        map.addLayer({
          id: "unclustered-fires-glow",
          type: "circle",
          source: "fires",
          filter: ["!", ["has", "point_count"]],
          paint: {
            "circle-color": ["case", ["==", ["get", "severity"], "CRITICAL"], "rgba(255,23,68,0.18)", "rgba(255,138,0,0.16)"],
            "circle-radius": ["interpolate", ["linear"], ["zoom"], 6, 10, 9, 14, 12, 18, 15, 24],
            "circle-opacity": 1
          }
        });
      }

      if (!map.getLayer("unclustered-fires")) {
        map.addLayer({
          id: "unclustered-fires",
          type: "circle",
          source: "fires",
          filter: ["!", ["has", "point_count"]],
          paint: {
            "circle-color": ["case", ["==", ["get", "severity"], "CRITICAL"], "#ff1744", "#ff8a00"],
            "circle-radius": ["interpolate", ["linear"], ["zoom"], 6, 4, 9, 6, 12, 8, 15, 10],
            "circle-opacity": 0.96,
            "circle-stroke-width": 2,
            "circle-stroke-color": "rgba(255,255,255,0.08)"
          }
        });
      }

      if (!map.__fireEventsBound) {
        map.__fireEventsBound = true;

        map.on("click", "clusters", (e) => {
          const features = map.queryRenderedFeatures(e.point, { layers: ["clusters"] });
          if (!features.length) return;
          const clusterId = features[0].properties.cluster_id;
          map.getSource("fires").getClusterExpansionZoom(clusterId, (err, zoom) => {
            if (err) return;
            map.easeTo({ center: features[0].geometry.coordinates, zoom, duration: 500 });
          });
        });

        map.on("click", "unclustered-fires", (e) => {
          const feature = e.features && e.features[0];
          if (!feature) return;
          openFirePopup(feature);
        });
      }
    }

    function updateFireSource(features) {
      const source = map.getSource("fires");
      if (!source) return;
      source.setData({ type: "FeatureCollection", features });
    }

    function updateUserMarker(coord) {
      if (!coord) return;
      if (userMarker) userMarker.remove();

      const el = document.createElement("div");
      el.className = "user-marker";

      userMarker = new maplibregl.Marker({ element: el })
        .setLngLat(coord)
        .addTo(map);
    }

    function setLocationButtonState(loading) {
      ["locate-btn-panel-desktop", "locate-btn-panel-mobile", "locate-btn-mobile"].forEach((id) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.disabled = loading;
        el.textContent = loading ? "Locating..." : "Use My Location";
      });
    }

    function openFirePopup(feature) {
      const coords = feature.geometry.coordinates.slice();
      const p = feature.properties || {};
      const lat = coords[1];
      const lng = coords[0];

      const severity = p.severity || "UNKNOWN";
      const severityClass = severity === "CRITICAL" ? "critical" : "normal";
      const detectedTime = formatDetectedTime(p.acq_date, p.acq_time);
      const frp = p.frp ?? "—";
      const confidence = p.confidence ?? "—";

      const milesFromYou = lastKnownUserCoord
        ? distMiles(lastKnownUserCoord, coords).toFixed(1) + " mi"
        : "Enable location";

      const googleMaps = `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`;
      const googleDirections = lastKnownUserCoord
        ? `https://www.google.com/maps/dir/${lastKnownUserCoord[1]},${lastKnownUserCoord[0]}/${lat},${lng}`
        : `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
      const appleDirections = lastKnownUserCoord
        ? `https://maps.apple.com/?saddr=${lastKnownUserCoord[1]},${lastKnownUserCoord[0]}&daddr=${lat},${lng}&dirflg=d`
        : `https://maps.apple.com/?daddr=${lat},${lng}&dirflg=d`;
      const satelliteFocus = `https://www.google.com/maps/@${lat},${lng},1200m/data=!3m1!1e3`;

      new maplibregl.Popup({ closeButton: true, closeOnMove: false, offset: 14, maxWidth: "320px" })
        .setLngLat(coords)
        .setHTML(`
          <div class="popup-card">
            <div class="popup-top">
              <div>
                <div class="popup-title">🔥 Fire Detection</div>
                <div class="popup-coords">${lat.toFixed(4)}, ${lng.toFixed(4)}</div>
              </div>
              <div class="popup-severity ${severityClass}">${severity}</div>
            </div>

            <div class="popup-grid">
              <div class="popup-metric">
                <div class="popup-metric-label">Detected Time</div>
                <div class="popup-metric-value">${detectedTime}</div>
              </div>
              <div class="popup-metric">
                <div class="popup-metric-label">Distance From You</div>
                <div class="popup-metric-value">${milesFromYou}</div>
              </div>
              <div class="popup-metric">
                <div class="popup-metric-label">FRP</div>
                <div class="popup-metric-value">${frp}</div>
              </div>
              <div class="popup-metric">
                <div class="popup-metric-label">Confidence</div>
                <div class="popup-metric-value">${confidence}</div>
              </div>
            </div>

            <div class="popup-note">
              Use directions for ground navigation context. This point is a satellite fire detection signal, not an on-scene emergency instruction.
            </div>

            <div class="popup-actions">
              <a class="popup-btn" href="${googleDirections}" target="_blank" rel="noopener noreferrer">Open Directions</a>
              <a class="popup-btn" href="${googleMaps}" target="_blank" rel="noopener noreferrer">Google Maps</a>
              <a class="popup-btn" href="${appleDirections}" target="_blank" rel="noopener noreferrer">Apple Directions</a>
              <a class="popup-btn" href="${satelliteFocus}" target="_blank" rel="noopener noreferrer">Satellite View</a>
            </div>
          </div>
        `)
        .addTo(map);

      map.easeTo({ center: coords, zoom: Math.max(map.getZoom(), 11.5), duration: 500 });
    }

    async function loadFireSignals() {
      const refresh = ui("refresh-btn");
      if (refresh) {
        refresh.disabled = true;
        refresh.innerHTML = '<span class="spinner"></span>REFRESHING';
      }

      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), FETCH_TIMEOUT_MS);

      try {
        const res = await fetch(FIRE_ENDPOINT, { signal: ctrl.signal, cache: "no-store" });
        clearTimeout(timer);

        if (!res.ok) throw new Error("Bad response");

        const json = await res.json();
        const normalized = normalizeFireFeatures(Array.isArray(json.features) ? json.features : []);
        latestFeatures = normalized;
        updateFireSource(normalized);

        setText("fire-count", normalized.length);

        let criticalCount = 0;
        let closest = Infinity;
        const ref = lastKnownUserCoord || REF_CENTER;

        normalized.forEach((f) => {
          if (f.properties?.severity === "CRITICAL") criticalCount++;
          const d = distMiles(ref, f.geometry.coordinates);
          if (d < closest) closest = d;
        });

        setText("critical-count", criticalCount > 0 ? criticalCount : "None");
        setText("nearest-fire", normalized.length ? `${closest.toFixed(1)} mi` : "None");
        setText("fetch-time", new Date().toLocaleTimeString("en-US", {
          timeZone: "Pacific/Honolulu",
          hour: "2-digit",
          minute: "2-digit"
        }) + " HST");
        setText("data-source", "NASA FIRMS · Kahu Ola Worker");
        setText("view-mode", currentViewMode);
        setText("basemap-mode", currentBasemap === "dark" ? "Dark" : "Satellite");

        const freshness = ui("freshness-badge");
        if (freshness) {
          freshness.className = "freshness f-fresh";
          freshness.textContent = "✓ FRESH";
        }

        const summary = ui("summary-text");
        if (summary) {
          summary.textContent = normalized.length
            ? `NASA FIRMS returned ${normalized.length} wildfire detection${normalized.length === 1 ? "" : "s"} across Hawaiʻi in this snapshot.`
            : "NASA FIRMS returned no current wildfire detections across Hawaiʻi in this snapshot.";
        }

        setText("summary-source", "Source: NASA FIRMS · Kahu Ola Worker");
        setText("summary-updated", "Updated: " + new Date().toLocaleTimeString("en-US", {
          timeZone: "Pacific/Honolulu",
          hour: "2-digit",
          minute: "2-digit"
        }) + " HST");
        setText("summary-privacy", lastKnownUserCoord ? "Location stays on device" : "No device location used");
      } catch (e) {
        const summary = ui("summary-text");
        if (summary) {
          summary.textContent = "Unable to refresh fire signals right now.";
        }
      } finally {
        if (refresh) {
          refresh.disabled = false;
          refresh.innerHTML = "↻ REFRESH";
        }
      }
    }

    function toggleBasemap() {
      currentBasemap = currentBasemap === "dark" ? "satellite" : "dark";
      map.setStyle(currentBasemap === "dark" ? STYLES.dark : STYLES.satellite);
    }

    function useMyLocation() {
      if (!("geolocation" in navigator)) return;

      setLocationButtonState(true);

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          lastKnownUserCoord = [pos.coords.longitude, pos.coords.latitude];
          currentViewMode = "My Location";
          updateUserMarker(lastKnownUserCoord);
          map.flyTo({
            center: lastKnownUserCoord,
            zoom: Math.max(map.getZoom(), 9),
            speed: 0.8,
            essential: true
          });
          setLocationButtonState(false);
          loadFireSignals();
        },
        () => setLocationButtonState(false),
        { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
      );
    }

    document.getElementById("refresh-btn-desktop")?.addEventListener("click", loadFireSignals);
    document.getElementById("refresh-btn-mobile")?.addEventListener("click", loadFireSignals);

    document.getElementById("locate-btn-panel-desktop")?.addEventListener("click", useMyLocation);
    document.getElementById("locate-btn-panel-mobile")?.addEventListener("click", useMyLocation);
    document.getElementById("locate-btn-mobile")?.addEventListener("click", useMyLocation);

    document.getElementById("satellite-btn-panel-desktop")?.addEventListener("click", toggleBasemap);
    document.getElementById("satellite-btn-panel-mobile")?.addEventListener("click", toggleBasemap);
    document.getElementById("satellite-btn-mobile")?.addEventListener("click", toggleBasemap);

    sheetToggleBtn?.addEventListener("click", () => {
      setSheetOpen(!mobileSheet.classList.contains("open"));
    });

    sheetHandleWrap?.addEventListener("click", () => {
      setSheetOpen(!mobileSheet.classList.contains("open"));
    });

    map.on("load", () => {
      ensureFireLayers();
      map.fitBounds(HAWAII_BOUNDS, {
        padding: { top: 96, right: 24, bottom: 120, left: 24 },
        duration: 0,
        maxZoom: 8
      });

      if (window.innerWidth <= MOBILE_BREAKPOINT) {
        setSheetOpen(false);
      }

      loadFireSignals();
      setTimeout(safeResize, 100);
      setTimeout(safeResize, 300);
    });

    map.on("style.load", () => {
      ensureFireLayers();
      loadFireSignals();
      setTimeout(safeResize, 100);
      setTimeout(safeResize, 300);
    });

    window.addEventListener("resize", () => {
      setTimeout(safeResize, 100);
    });

    window.addEventListener("orientationchange", () => {
      setTimeout(safeResize, 150);
      setTimeout(safeResize, 450);
    });
  </script>
</body>
</html>
