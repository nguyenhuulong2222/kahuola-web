name = "kahuola-tiles-broker"
main = "src/index.ts"
compatibility_date = "2026-03-15"
workers_dev = false

[triggers]
crons = ["30 15 * * *"]

[[routes]]
pattern = "kahuola.org/api/*"
zone_name = "kahuola.org"

[vars]
PROJECT_NAME = "Kahu Ola"
PROJECT_VERSION = "4.8"
ENVIRONMENT = "production"
REGION = "hawaii"

NASA_FIRMS_DATASET = "VIIRS_SNPP_NRT"
NASA_FIRMS_BBOX = "-161,18,-154,23"
NASA_FIRMS_DAY_RANGE = "1"

# Secrets already set in Cloudflare dashboard:
# FIRMS_MAP_KEY
# AIRNOW_API_KEY
