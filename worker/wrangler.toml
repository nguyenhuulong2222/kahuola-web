name = "kahuola-tiles-broker"
main = "src/index.ts"
compatibility_date = "2026-03-15"
workers_dev = false

[triggers]
crons = ["30 15 * * *"]

[[routes]]
pattern = "kahuola.org/api/*"
zone_name = "kahuola.org"

[vars]
PROJECT_NAME = "Kahu Ola"
PROJECT_VERSION = "4.8"
ENVIRONMENT = "production"
REGION = "hawaii"

NASA_FIRMS_DATASET = "VIIRS_SNPP_NRT"
NASA_FIRMS_BBOX = "-161,18,-154,23"
NASA_FIRMS_DAY_RANGE = "1"

# Secrets already set in Cloudflare dashboard:
# FIRMS_MAP_KEY
# AIRNOW_API_KEY

# ── KV namespace for Zone Brief cache + snapshot diff (Phase 2) ──
# Provisioned 2026-04-10 via:
#   npx wrangler kv namespace create KAHUOLA_CACHE
# Phase 1 still uses in-memory per-isolate maps in worker/src/cache.ts;
# this binding is wired so Phase 2 migration (swap Maps → KV) can ship
# without a follow-up deploy.
[[kv_namespaces]]
binding = "KAHUOLA_CACHE"
id = "76de514417fb4821bc1e51bac04b30a1"

# ── Workers AI binding for Gemma 4 inference (Phase 2) ──
# Model id (hardcoded in worker/src/gemma.ts): @cf/google/gemma-4-26b-a4b-it
# Doctrine: Gemma 4 only. No Gemini. No other AI vendor.
[ai]
binding = "AI"

# ── R2 bucket for voice audio cache (Phase 2.2) ──
# Bucket already exists: kahuola-media
# Cache key: voice/{zone_id}/{lang}/{date_hst}.mp3
# Invalidated daily — new brief audio generated each morning.
[[r2_buckets]]
binding = "KAHUOLA_MEDIA"
bucket_name = "kahuola-media"
